version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: decepticon-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-decepticon}
      POSTGRES_USER: ${POSTGRES_USER:-decepticon_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - decepticon_network
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  decepticon_network:
    driver: bridge
